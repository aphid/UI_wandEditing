<!DOCTYPE html>
<head>
    <style>
        /* UI outside border */
        #main_ground{
            width: 1200px;
            height: 720px;
            background-color: rgb(12, 12, 12);
            display:flex;
        }

        #ui{
            width: 1100px;
            height:620px;
            margin: auto;
            background-color: rgb(40, 40, 40);
            border: solid;
            border-width: 3px;
            border-color: rgb(235, 229, 185);
            position:relative;
            opacity: 0;
            transition: opacity 1s ease-out;
        }

        #inner_border{
            width: 1090px;
            height:610px;
            margin: auto;
            margin-top: 2px;
            background-color: #5b4636;
            border: solid;
            border-width: 3px;
            border-color: rgb(235, 229, 185);
        }

        /* inside elements */
        .selection{
            border: solid;
            border-width: 2px;
            border-color: rgb(235, 229, 185);
        }

        #weapon{
            width: 780px;
            height: 200px;
            position:absolute;
            top: 20px;
            left:45px;
            background-color: #7a5a40;
        }
        #inventory{
            width: 650px;
            height: 332px;
            position:absolute;
            top: 250px;
            left:45px;
            background-color: #654b38;
        }
        #info_weapon{
            width: 205px;
            height: 200px;
            position:absolute;
            top: 20px;
            left: 840px;
            background-color: #4f3c2e;
        }
        #info_element{
            width: 335px;
            height: 332px;
            position:absolute;
            top: 250px;
            left:710px;
            background-color:#3f3025;
        }
        #wand{
            rotate: 90deg;
            width: 150px;
            height: 300px;
            position: absolute;
            top: -70px;
            left: 250px;
        }

        th{
            border: solid;
            border-width: 1px;
            border-color: rgb(235, 229, 185);
            background-color: #7a5a40;
            height: 60px;
            width: 60px;
        }
        .weapon_insert{
            border: solid;
            border-width: 1px;
            border-color: rgb(235, 229, 185);
            background-color: #7a5a40;
            height: 60px;
            width: 60px;
            position: absolute;
            top: 110px;
        }
        #weapon_insert1{
            left: 150px;
        }
        #weapon_insert2{
            left: 250px;
        }
        #weapon_insert3{
            left: 350px;
        }
        #weapon_insert4{
            left: 450px;
        }
        .wea_info, .ele_info{
            color: rgb(255, 162, 0);
        }

        h2{
            color: rgb(255, 245, 204);
        }

        #exit{
            border: solid;
            border-width: 1px;
            border-color: rgb(235, 229, 185);
            height: 25px;
            width: 25px;
            background-color: rgb(182, 122, 54);
            font-size: 25px;
            position: absolute;
            top: 25px;
            right: 15px;
        }
        span{
            color: green;
        }
    </style>
</head>
<body>
    <div id = "main_ground">
        <div id = "ui">
            <div id = "inner_border">
                <div id = "weapon" class = "selection">
                    <img src="images/wand.png" alt="weapon" id = "wand">
                    <div id = "weapon_insert_selection">
                        <span id = "weapon_insert1" class = "weapon_insert"></span>
                        <span id = "weapon_insert2" class = "weapon_insert"></span>
                        <span id = "weapon_insert3" class = "weapon_insert"></span>
                        <span id = "weapon_insert4" class = "weapon_insert"></span>
                    </div>
                </div>
                <div id = "inventory" class = "selection">
                    <table>
                        <tr>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                        </tr>
                         <tr>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                         </tr>
                         <tr>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                         </tr>
                         <tr>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                         </tr>
                         <tr>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                         </tr>
                    </table>
                </div>
                <div id = "info_weapon" class = "selection">
                    <h2> Wizzer's wand</h2>
                    <div class = "wea_info">Attack speed: <span>0.6</span></div>
                    <div class = "wea_info">Attack damages: <span id = "damageDisplay">5</span></div>
                    <div class = "wea_info">Scattering: <span>-0.1</span></div>
                </div>
                <div id = "info_element" class = "selection">
                    <h2> Name: <span></span></h2>
                    <div class = "ele_info">Description: <span></span></div>
                </div>
            </div>
            <div id="exit" onclick="window.close()">X</div>
        </div>
    </div>

    <script src = "tableControl.js"></script>
</body>
